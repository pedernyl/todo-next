name: todos
type: App
title: Todo batch size settings
description: Controls how many todos are loaded by default in each batch (every scrolling) and the maximum allowed batch size.
fields:
  - key: defaultLoadLimit
    label: Default todos to load
    type: number
    default: 50
    min: 1
    max: 200
    step: 1

  - key: maxLoadLimit
    label: Max todos allowed
    type: number
    default: 200
    min: 1
    max: 2000
    step: 1
